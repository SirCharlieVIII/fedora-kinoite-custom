name: Build Custom Kinoite

on:
  schedule:
    # Rebuild daily at 06:00 UTC so you pick up upstream Kinoite updates
    - cron: "0 6 * * *"
  push:
    branches:
      - main
    paths-ignore:
      - "**.md"
      - "**.txt"
  pull_request:
    branches:
      - main
  workflow_dispatch: # allow manual runs from the GitHub UI

env:
  IMAGE_REGISTRY: ghcr.io/${{ github.repository_owner }}

jobs:
  build:
    name: Build image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write # needed for cosign keyless signing

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Custom Image
        uses: blue-build/github-action@v1
        with:
          recipe: recipe.yml
          cosign_private_key: ${{ secrets.SIGNING_SECRET }}
          registry_token: ${{ github.token }}
          pr_event_number: ${{ github.event.number }}
          use_unstable_cli: false
