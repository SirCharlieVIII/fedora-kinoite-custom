---
# yaml-language-server: $schema=https://schema.blue-build.org/recipe-v1.json

name: fedora-kinoite-custom
description: Custom Fedora Kinoite image with gaming and productivity tools

base-image: ghcr.io/ublue-os/kinoite-main
image-version: latest # always track the latest stable Fedora Kinoite

modules:
  # ── DNF packages layered into the image ───────────────────────────────────
  - type: dnf
    install:
      packages:
        - fastfetch
        - gamemode
        - gamemoded
        - openvpn
        - steam
        - wireguard-tools
    remove:
      packages:
        - firefox
        - firefox-langpacks

  # ── Flatpaks installed at first boot via systemd service ──────────────────
  - type: default-flatpaks
    configurations:
      - notify: true
        scope: system
        install:
          - org.fedoraproject.MediaWriter                         # Fedora Media Writer
          - org.mozilla.firefox                                   # Firefox
          - io.github.benjamimgois.goverlay                       # GOverlay
          - org.kde.gwenview                                      # Gwenview
          - com.heroicgameslauncher.hgl                           # Heroic Games Launcher
          - org.kde.kcalc                                         # KCalc
          - org.kde.kolourpaint                                   # Kolour Paint
          - io.github.DenysMb.Kontainer                           # Kontainer
          - org.kde.krdc                                          # KRDC
          - org.kde.krita                                         # Krita
          - org.libreoffice.LibreOffice                           # Libre Office
          - org.freedesktop.Platform.VulkanLayer.MangoHud//25.08  # MangoHud
          - md.obsidian.Obsidian                                  # Obsidian
          - org.kde.okular                                        # Okular
          - tv.plex.PlexDesktop                                   # Plex Desktop
          - org.prismlauncher.PrismLauncher                       # Prism Launcher
          - net.davidotek.pupgui2                                 # Proton Up Qt
          - org.virt_manager.virt_manager.Extension.Qemu          # Qemu
          - dev.vencord.Vesktop                                   # Vesktop
          - org.virt_manager.virt-manager                         # Virt Manager
          - org.videolan.VLC                                      # VLC
          - com.vscodium.codium                                   # VSCodium


  # ── Customise /etc/os-release so the image identifies itself correctly ────
  - type: os-release
    properties:
      ID: fedora_kinoite_custom
      NAME: FedoraKinoiteCustom
      PRETTY_NAME: "Fedora Kinoite Custom Image"

  # ── Embed signing keys so rebased installs can verify image integrity ─────
  - type: signing
