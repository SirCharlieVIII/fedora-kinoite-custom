---
# yaml-language-server: $schema=https://schema.blue-build.org/recipe-v1.json

name: fedora-kinoite-custom
description: Custom Fedora Kinoite image with gaming and productivity tools

base-image: ghcr.io/ublue-os/kinoite-main
image-version: latest # always track the latest stable Fedora Kinoite

modules:
  # ── DNF packages layered into the image ───────────────────────────────────
  - type: dnf
    install:
      packages:
        - fastfetch
        - gamemode
        - gamemoded
        - openvpn
        - steam
        - wireguard-tools
    remove:
      packages:
        - firefox
        - firefox-langpacks

  # ── Flatpaks installed at first boot via systemd service ──────────────────
  - type: default-flatpaks
    configurations:
      - notify: true
        scope: system
        install:
          - com.heroicgameslauncher.hgl
          - com.vscodium.codium
          - dev.vencord.Vesktop
          - io.github.benjamimgois.goverlay
          - io.github.DenysMb.Kontainer
          - md.obsidian.Obsidian
          - net.davidotek.pupgui2
          - org.fedoraproject.MediaWriter
          - org.mozilla.firefox
          - runtime/org.freedesktop.Platform.VulkanLayer.MangoHud/x86_64/25.08
          - org.kde.gwenview
          - org.kde.kcalc
          - org.kde.kolourpaint
          - org.kde.krita
          - org.kde.krdc
          - org.kde.okular
          - org.libreoffice.LibreOffice
          - org.prismlauncher.PrismLauncher
          - org.videolan.VLC
          - org.virt_manager.virt-manager
          - org.virt_manager.virt_manager.Extension.Qemu
          - tv.plex.PlexDesktop

  # ── Customise /etc/os-release so the image identifies itself correctly ────
  - type: os-release
    properties:
      id: fedora_kinoite_custom
      name: FedoraKinoiteCustom
      pretty-name: Fedora Kinoite Custom Image

  # ── Embed signing keys so rebased installs can verify image integrity ─────
  - type: signing
